<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OOJS feladat</title>
    <link rel="stylesheet" href="oojs.css">
</head>
<body onload="initGame()">
<main id="gameArea">
    <div id="score">Pontok: 0</div>
    <div id="ground"></div>
    <div id="gameOver">
        <p class="game-over">Játék vége!</p>
        <p id="final-score">Pontok: 0</p>
        <p class="restart-text">Új játék kezdése: SPACE vagy bal klikk</p>
    </div>
    <div class="game-object player"></div>
</main>

<script src="oojs.js"></script>
</body>
</html>
