<html lang="hu">
<head>
    <meta charset="utf-8"/>
    <title>Fetch API CRUD</title>
    <link rel="stylesheet" href="fetchapi.css"/>
</head>
<body>
    <main>
        <header>
            <h1>Fetch API CRUD</h1>
        </header>
        <div class="new-data">
            <form method="post" action="/php/backend.php">
                <label for="nev">Név</label>
                <input type="text" name="nev" id="nev" required/>
                <label for="kategoria">Kategória</label>
                <input type="text" name="kategoria" id="kategoria" required/>
                <button type="submit">Hozzáadás</button>
            </form>
        </div>
        <table id="data-table">
            <thead>
                <tr>
                    <th>ID</th><th>Név</th><th>Kategória</th><th>Műveletek</th>
                </tr>
            </thead>
            <tbody id="data-rows"></tbody>
        </table>
    </main>
    <script src="fetchapi.js"></script>
</body>
</html>
