<html lang="hu">
<head>
    <meta charset="utf-8"/>
    <title>Fetch API CRUD</title>
    <link rel="stylesheet" href="fetchapi.css"/>
</head>
<body>
    <main>
        <header>
            <h1>Fetch API CRUD</h1>
        </header>
        <div class="new-data">
            <form method="post" action="/php/backend.php">
                <div>
                    <input type="text" name="nev" id="nev" placeholder="Név" required/>
                </div>
                <div>
                    <input type="text" name="kategoria" id="kategoria" placeholder="Kategória" required/>
                </div>
                <button type="submit" class="add-btn">Hozzáadás</button>
            </form>
        </div>
        <table id="data-table">
            <thead>
                <tr>
                    <th>ID</th><th>Név</th><th>Kategória</th><th>Műveletek</th>
                </tr>
            </thead>
            <tbody id="data-rows"></tbody>
        </table>
    </main>
    <script src="fetchapi.js"></script>
</body>
</html>
